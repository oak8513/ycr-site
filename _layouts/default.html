<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G3BBCS8MFG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-G3BBCS8MFG');
  </script>
  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wihtxpkrt1");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  {% if page.canonical %}<link rel="canonical" href="{{ page.canonical }}">{% endif %}
  <meta property="og:type" content="{{ page.og_type | default: 'website' }}">
  <meta property="og:title" content="{{ page.og_title | default: page.title }}">
  <meta property="og:description" content="{{ page.og_description | default: page.description }}">
  {% if page.canonical %}<meta property="og:url" content="{{ page.canonical }}">{% endif %}
  <meta property="og:site_name" content="York Computer Repair">
  {% if page.og_type == "article" %}<meta property="article:published_time" content="{{ page.date | date: '%Y-%m-%d' }}">{% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ycr-blue':'#0B3D91','ycr-steel':'#4A5568','ycr-white':'#F7FAFC',
            'ycr-black':'#1A202C','ycr-signal':'#3182CE','ycr-green':'#38A169',
            'ycr-orange':'#DD6B20','ycr-gray':'#CBD5E0',
          },
          fontFamily: {
            sans:['"Open Sans"','Helvetica','sans-serif'],
            heading:['Montserrat','Arial','sans-serif'],
            impact:['Impact','"Arial Narrow"','sans-serif'],
          }
        }
      }
    }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "@id": "https://yorkcomputerrepair.com/#localbusiness",
    "name": "York Computer Repair",
    "url": "https://yorkcomputerrepair.com",
    "telephone": "+17177399675",
    "email": "help@yorkcomputerrepair.com",
    "priceRange": "$$",
    "image": "https://yorkcomputerrepair.com/assets/storefront.jpg",
    "description": "Expert laptop and PC repair in York, PA. Virus removal, data recovery, screen replacement, SSD upgrades, and more. Walk-ins welcome.",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "2069 Carlisle Rd",
      "addressLocality": "York",
      "addressRegion": "PA",
      "postalCode": "17408",
      "addressCountry": "US"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": 39.9526,
      "longitude": -76.7277
    },
    "openingHoursSpecification": [
      {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
        "opens": "09:00",
        "closes": "17:00"
      }
    ],
    "areaServed": [
      {"@type": "City", "name": "York, PA"},
      {"@type": "City", "name": "Shiloh, PA"},
      {"@type": "City", "name": "Spring Grove, PA"},
      {"@type": "City", "name": "Hanover, PA"}
    ],
    "sameAs": [
      "https://www.google.com/maps?cid=york-computer-repair"
    ]
  }
  </script>

  {% if page.service %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Service",
    "name": {{ page.service | jsonify }},
    "url": {{ page.canonical | default: page.url | jsonify }},
    "serviceType": {{ page.service_type | default: page.service | jsonify }},
    "description": {{ page.description | jsonify }},
    "areaServed": {"@type": "City", "name": "York, PA"},
    "provider": {"@id": "https://yorkcomputerrepair.com/#localbusiness"}
  }
  </script>
  {% endif %}

  {% if page.is_blog_post %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": {{ page.title | jsonify }},
    "description": {{ page.description | jsonify }},
    "url": {{ page.canonical | default: page.url | jsonify }},
    "image": "https://yorkcomputerrepair.com/assets/storefront.jpg",
    "datePublished": "{{ page.date | default: site.time | date: '%Y-%m-%d' }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | default: site.time | date: '%Y-%m-%d' }}",
    "author": {"@type": "Organization", "name": "York Computer Repair"},
    "publisher": {
      "@type": "Organization",
      "name": "York Computer Repair",
      "logo": {
        "@type": "ImageObject",
        "url": "https://yorkcomputerrepair.com/assets/storefront.jpg"
      }
    },
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": {{ page.canonical | default: page.url | jsonify }}
    }
  }
  </script>
  {% endif %}
</head>
<body class="font-sans bg-ycr-white text-ycr-black">
  {% include nav.html %}
  {{ content }}
  {% include footer.html %}
  <elevenlabs-convai agent-id="agent_5201k1e3k8j1etpvy0tnctn2f1hy"></elevenlabs-convai>
  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</body>
</html>
